services:
  - type: web
    name: ethara-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethara-postgres
          property: connectionString
      - key: FRONTEND_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ENVIRONMENT
        value: production

databases:
  - name: ethara-postgres
    databaseName: ethara_db
    user: ethara_user
