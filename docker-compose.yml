services:
  postgres:
    image: postgres:16-alpine
    container_name: ethara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ethara_db
      POSTGRES_USER: ethara_user
      POSTGRES_PASSWORD: ethara_pass
    ports:
      - "5432:5432"
    volumes:
      - ethara_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethara_user -d ethara_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ethara_postgres_data: